<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>股票行事曆</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
      --border:#30363d; --text:#e6edf3; --muted:#8b949e; --dim:#484f58;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#e3b341; --orange:#f0883e; --purple:#d2a8ff;
    }
    body { font-family:"Helvetica Neue",Arial,"PingFang TC",sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh; }

    /* topbar */
    .topbar { display:flex; align-items:center; gap:.75rem; padding:0 1.25rem;
              height:50px; background:var(--bg2); border-bottom:1px solid var(--border);
              position:sticky; top:0; z-index:20; }
    .topbar h1 { font-size:1rem; font-weight:700; color:var(--blue); white-space:nowrap; }
    .nav-link  { color:var(--muted); font-size:.82rem; text-decoration:none;
                 padding:.3rem .7rem; border:1px solid var(--border); border-radius:6px; }
    .nav-link:hover { color:var(--text); border-color:var(--muted); }

    /* toolbar */
    .toolbar { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
               padding:.6rem 1.25rem; background:var(--bg2);
               border-bottom:1px solid var(--border); }
    .mkt-toggle { display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .mkt-btn    { padding:.32rem .85rem; background:none; border:none; cursor:pointer;
                  font-size:.85rem; font-weight:600; color:var(--muted); }
    .mkt-btn.active { background:var(--blue); color:#fff; }
    .month-nav  { display:flex; align-items:center; gap:.4rem; }
    .nav-arrow  { background:var(--bg3); border:1px solid var(--border); border-radius:5px;
                  color:var(--text); cursor:pointer; font-size:.9rem;
                  padding:.28rem .65rem; font-weight:700; }
    .nav-arrow:hover { border-color:var(--muted); }
    .month-label{ font-size:.95rem; font-weight:700; min-width:6rem; text-align:center; }
    .legend     { display:flex; gap:.6rem; flex-wrap:wrap; margin-left:auto; font-size:.72rem; }
    .leg-item   { display:flex; align-items:center; gap:.25rem; color:var(--muted); }
    .leg-dot    { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

    /* calendar grid */
    .cal-wrap { display:flex; gap:0; }
    .cal-main { flex:1; padding:.75rem 1.25rem 2rem; min-width:0; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px;
                background:var(--border); border:1px solid var(--border); border-radius:8px;
                overflow:hidden; }
    .day-header{ background:var(--bg2); color:var(--dim); font-size:.72rem;
                 font-weight:700; text-align:center; padding:.35rem 0;
                 text-transform:uppercase; }
    .day-cell  { background:var(--bg); min-height:88px; padding:.35rem .4rem;
                 cursor:pointer; transition:background .1s; position:relative; }
    .day-cell:hover { background:var(--bg2); }
    .day-cell.today  { background:#1f3a5f22; }
    .day-cell.today .day-num { color:var(--blue); font-weight:800; }
    .day-cell.selected { background:#1f6feb22; outline:2px solid var(--blue); outline-offset:-1px; }
    .day-cell.other-month { background:var(--bg); opacity:.4; cursor:default; }
    .day-cell.weekend .day-num { color:var(--orange); }
    .day-cell.holiday  { background:#2d150e22; }
    .day-num   { font-size:.78rem; font-weight:600; margin-bottom:.2rem; }
    .event-chips { display:flex; flex-direction:column; gap:.15rem; }
    .ev-chip   { font-size:.62rem; font-weight:700; padding:.08rem .3rem;
                 border-radius:3px; white-space:nowrap; overflow:hidden;
                 text-overflow:ellipsis; cursor:pointer; }
    .ev-more   { font-size:.6rem; color:var(--dim); padding:.05rem .2rem; }
    .ev-earnings { background:#1f3a5f; color:var(--blue); }
    .ev-exdiv    { background:#0d2a1a; color:var(--green); }
    .ev-exright  { background:#2d1f0e; color:var(--orange); }
    .ev-dividend { background:#1a0a2e; color:var(--purple); }
    .ev-holiday  { background:#3d1515; color:var(--red); }
    .ev-fed      { background:#2d2200; color:#e3b341; border:1px solid #9e6a0366; font-weight:800; }

    /* side panel */
    .cal-side { width:280px; flex-shrink:0; border-left:1px solid var(--border);
                padding:.75rem 1rem 2rem; overflow-y:auto; max-height:calc(100vh - 110px);
                position:sticky; top:60px; }
    .side-date { font-size:.9rem; font-weight:700; color:var(--blue);
                 margin-bottom:.6rem; padding-bottom:.4rem;
                 border-bottom:1px solid var(--border); }
    .side-empty{ color:var(--dim); font-size:.82rem; padding:.5rem 0; }
    .side-event{ display:flex; gap:.5rem; align-items:flex-start;
                 padding:.4rem 0; border-bottom:1px solid var(--bg3); }
    .side-event:last-child { border-bottom:none; }
    .side-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:.35rem; }
    .side-info { flex:1; min-width:0; }
    .side-sym  { font-weight:700; font-size:.82rem; color:var(--blue); }
    .side-name { font-size:.72rem; color:var(--muted); white-space:nowrap;
                 overflow:hidden; text-overflow:ellipsis; }
    .side-type { font-size:.68rem; font-weight:700; color:var(--dim); }
    .side-detail { font-size:.7rem; color:var(--dim); }

    /* spinner */
    .spinner-wrap { display:flex; justify-content:center; align-items:center;
                    gap:.75rem; padding:3rem; color:var(--muted); }
    .spinner-ring { width:22px; height:22px; border:2px solid var(--border);
                    border-top-color:var(--blue); border-radius:50%;
                    animation:spin .75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* themes */
    html.theme-white { --bg:#fff; --bg2:#f6f8fa; --bg3:#eaeef2;
      --border:#d0d7de; --text:#24292f; --muted:#57606a; --dim:#8c959f; }
    html.theme-lightblue { --bg:#eaf5ff; --bg2:#d7edf9; --bg3:#c2dff0;
      --border:#8abcd8; --text:#0a2742; --muted:#2d6a8a; --dim:#5a90b0; }
    html.theme-lightyellow { --bg:#fffbe8; --bg2:#fef9df; --bg3:#fdf7d7;
      --border:#f3eac1; --text:#1e1400; --muted:#503800; --dim:#8d7318; }

    @media (max-width:768px) {
      .cal-side { display:none; }
      .cal-main { padding:.5rem .5rem 2rem; }
      .day-cell  { min-height:60px; padding:.25rem .2rem; }
      .day-num   { font-size:.72rem; }
      .ev-chip   { font-size:.56rem; }
      .legend    { display:none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>📅 股票行事曆</h1>
  <a class="nav-link" href="/">🏠 Home</a>
  <a class="nav-link" href="/market">📊 市場</a>
  <a class="nav-link" href="/scan">🔍 掃描</a>
</div>

<div class="toolbar">
  <div class="mkt-toggle">
    <button class="mkt-btn active" id="mktUS" onclick="setMarket('US')">🇺🇸 US</button>
    <button class="mkt-btn"        id="mktTW" onclick="setMarket('TW')">🇹🇼 TW</button>
  </div>
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-arrow" onclick="changeMonth(1)">›</button>
    <button class="nav-arrow" onclick="goToday()" style="font-size:.75rem;padding:.28rem .5rem">今日</button>
  </div>
  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:#58a6ff"></span>財報日</span>
    <span class="leg-item"><span class="leg-dot" style="background:#3fb950"></span>除息日</span>
    <span class="leg-item"><span class="leg-dot" style="background:#f0883e"></span>除權日</span>
    <span class="leg-item"><span class="leg-dot" style="background:#d2a8ff"></span>股息發放</span>
    <span class="leg-item"><span class="leg-dot" style="background:#f85149"></span>休市/假日</span>
    <span class="leg-item"><span class="leg-dot" style="background:#e3b341"></span>FED/FOMC</span>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-main" id="calMain">
    <div class="spinner-wrap"><div class="spinner-ring"></div>載入中…</div>
  </div>
  <div class="cal-side" id="calSide">
    <div class="side-date">請點選日期</div>
    <div class="side-empty">選擇日期查看當日事件</div>
  </div>
</div>

<script>
(function(){
  const t = localStorage.getItem("theme")||"dark";
  if(t!=="dark") document.documentElement.classList.add("theme-"+t);
})();

let _market = "US";
let _today  = new Date();
let _year   = _today.getFullYear();
let _month  = _today.getMonth() + 1;  // 1-12
let _events = {};   // date -> [{...}]
let _selDate = null;

const TYPE_COLOR = {
  earnings:"#58a6ff", exdiv:"#3fb950", exright:"#f0883e",
  dividend:"#d2a8ff", holiday:"#f85149", fed:"#e3b341"
};
const TYPE_LABEL = {
  earnings:"財報日", exdiv:"除息日", exright:"除權日",
  dividend:"股息發放日", holiday:"休市", fed:"聯準會FOMC"
};
const TYPE_CLS = {
  earnings:"ev-earnings", exdiv:"ev-exdiv", exright:"ev-exright",
  dividend:"ev-dividend", holiday:"ev-holiday", fed:"ev-fed"
};

const MONTHS_ZH = ["","一月","二月","三月","四月","五月","六月",
                   "七月","八月","九月","十月","十一月","十二月"];
const DAYS_ZH   = ["日","一","二","三","四","五","六"];

function setMarket(m) {
  _market = m;
  document.getElementById("mktUS").classList.toggle("active", m==="US");
  document.getElementById("mktTW").classList.toggle("active", m==="TW");
  loadMonth();
}

function goToday() {
  _year  = _today.getFullYear();
  _month = _today.getMonth() + 1;
  loadMonth();
}

function changeMonth(delta) {
  _month += delta;
  if (_month < 1)  { _month = 12; _year--; }
  if (_month > 12) { _month = 1;  _year++; }
  loadMonth();
}

async function loadMonth() {
  const ym = `${_year}-${String(_month).padStart(2,"0")}`;
  document.getElementById("monthLabel").textContent = `${_year} / ${MONTHS_ZH[_month]}`;
  document.getElementById("calMain").innerHTML =
    '<div class="spinner-wrap"><div class="spinner-ring"></div>載入中…</div>';

  try {
    const data = await fetch(`/calendar/events?market=${_market}&month=${ym}`).then(r=>r.json());
    _events = {};
    (data.events || []).forEach(e => {
      if (!_events[e.date]) _events[e.date] = [];
      _events[e.date].push(e);
    });
    renderCalendar();
  } catch(err) {
    document.getElementById("calMain").innerHTML =
      `<div class="spinner-wrap" style="color:var(--red)">載入失敗：${err.message}</div>`;
  }
}

function renderCalendar() {
  const ym = `${_year}-${String(_month).padStart(2,"0")}`;
  const firstDay = new Date(_year, _month-1, 1);
  const lastDay  = new Date(_year, _month, 0);
  const startDow = firstDay.getDay();   // 0=Sun
  const totalDays = lastDay.getDate();
  const todayStr  = _today.toISOString().slice(0,10);

  let html = '<div class="cal-grid">';
  // Day headers
  DAYS_ZH.forEach(d => html += `<div class="day-header">${d}</div>`);

  // Leading blanks
  for (let i=0; i<startDow; i++)
    html += '<div class="day-cell other-month"></div>';

  // Days
  for (let d=1; d<=totalDays; d++) {
    const dateStr = `${_year}-${String(_month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow   = new Date(_year, _month-1, d).getDay();
    const isToday    = dateStr === todayStr;
    const isWeekend  = dow === 0 || dow === 6;
    const isSelected = dateStr === _selDate;
    const dayEvents  = _events[dateStr] || [];
    const isHoliday  = dayEvents.some(e => e.type === "holiday");

    let cls = "day-cell";
    if (isToday)    cls += " today";
    if (isWeekend)  cls += " weekend";
    if (isSelected) cls += " selected";
    if (isHoliday)  cls += " holiday";

    let chipsHtml = "";
    const shown = dayEvents.slice(0, 3);
    const extra = dayEvents.length - shown.length;
    shown.forEach(e => {
      const label = e.symbol || e.name;
      chipsHtml += `<div class="ev-chip ${TYPE_CLS[e.type]||"ev-earnings"}" title="${e.name}">${label}</div>`;
    });
    if (extra > 0) chipsHtml += `<div class="ev-more">+${extra} 更多</div>`;

    html += `<div class="${cls}" onclick="selectDay('${dateStr}')">
      <div class="day-num">${d}</div>
      <div class="event-chips">${chipsHtml}</div>
    </div>`;
  }

  // Trailing blanks
  const lastDow = lastDay.getDay();
  for (let i = lastDow+1; i < 7; i++)
    html += '<div class="day-cell other-month"></div>';

  html += '</div>';

  // Summary row
  const totalEvents = Object.values(_events).flat().length;
  const earningsCount = Object.values(_events).flat().filter(e=>e.type==="earnings").length;
  const fedCount = Object.values(_events).flat().filter(e=>e.type==="fed"&&e.name.includes("決策")).length;
  html += `<p style="font-size:.72rem;color:var(--dim);margin-top:.6rem;">
    本月 ${totalEvents} 個事件 · 財報日 ${earningsCount} 檔 · FOMC ${fedCount} 次 · 點擊日期查看詳情
  </p>`;

  document.getElementById("calMain").innerHTML = html;
}

function selectDay(dateStr) {
  _selDate = dateStr;
  renderCalendar();   // re-render to show selected highlight

  const side  = document.getElementById("calSide");
  const dayEvents = _events[dateStr] || [];
  const d = new Date(dateStr + "T12:00:00");
  const label = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${DAYS_ZH[d.getDay()]})`;

  if (!dayEvents.length) {
    side.innerHTML = `<div class="side-date">${label}</div>
      <div class="side-empty">本日無事件</div>`;
    return;
  }

  const items = dayEvents.map(e => `
    <div class="side-event">
      <div class="side-dot" style="background:${TYPE_COLOR[e.type]||"#58a6ff"}"></div>
      <div class="side-info">
        <div><span class="side-sym">${e.symbol||""}</span>
          <span class="side-type" style="margin-left:.3rem;color:${TYPE_COLOR[e.type]}">${TYPE_LABEL[e.type]||e.type}</span></div>
        <div class="side-name">${e.name||""}</div>
        ${e.detail ? `<div class="side-detail">${e.detail}</div>` : ""}
      </div>
    </div>`).join("");

  side.innerHTML = `<div class="side-date">${label} · ${dayEvents.length} 事件</div>${items}`;
}

// Init
document.getElementById("monthLabel").textContent =
  `${_year} / ${MONTHS_ZH[_month]}`;
loadMonth();
</script>
</body>
</html>
